
services:
  # 🛠️ DEV SERVICE
  dev:
    build:
      context: .
      dockerfile: Dockerweb 
      target: builder
    container_name: template
    working_dir: /app

    # 1. The Tunnel: Map your Mac folder (.) to the Container folder (/app)
    volumes:
      - .:/app
      - /app/node_modules  # <--- ADD THIS LINE! (Isolates dependencies)
      - /app/.next

    ports:
      - "3000:3000"

    # ⚠️ CRITICAL: We need 'sh -c' to ensure dependencies exist before starting
    command: >
      sh -c "npm install && npm run dev"
